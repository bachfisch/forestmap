<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forst Map</title>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://unpkg.com/@observablehq/plot@0.6.16/dist/plot.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
  <style>
    :root {
      --sidebar-w: 280px;
      --panel-w: 340px;
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e0ddd8;
      --text: #2a2722;
      --text-muted: #888780;
      --accent: #1D9E75;
      --accent-hover: #178a65;
      --font: system-ui, -apple-system, sans-serif;
      --radius: 6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    /* ── SIDEBAR ─────────────────────────────────────────────── */

    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.2s ease;
    }

    #sidebar.collapsed { width: 0; border-right: none; }

    #sidebar-toggle {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 16px;
      height: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 var(--radius) var(--radius) 0;
      box-shadow: 2px 0 6px rgba(0,0,0,0.08);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--text-muted);
      padding: 0;
      line-height: 1;
    }

    #sidebar-toggle:hover { color: var(--text); background: var(--bg); }

    #sidebar-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-header h1 {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    #sidebar-header p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    #sidebar-nav {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0 16px;
    }

    .cat-group {
      border-bottom: 1px solid var(--border);
    }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      list-style: none;
      user-select: none;
    }

    .cat-header::-webkit-details-marker { display: none; }

    .cat-header:hover { background: var(--bg); }

    .cat-icon { font-size: 14px; line-height: 1; }

    .cat-label { flex: 1; }

    .cat-header::after {
      content: "›";
      font-size: 16px;
      color: var(--text-muted);
      transition: transform 0.15s;
    }

    details[open] > .cat-header::after { transform: rotate(90deg); }

    .subcat-group {
      border-top: 1px solid var(--border);
    }

    .subcat-header {
      display: flex;
      align-items: center;
      padding: 6px 16px 6px 24px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      list-style: none;
      user-select: none;
      gap: 6px;
    }

    .subcat-header::-webkit-details-marker { display: none; }
    .subcat-header:hover { background: var(--bg); }

    .subcat-header::before {
      content: "›";
      font-size: 14px;
      color: var(--text-muted);
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    details.subcat-group[open] > .subcat-header::before { transform: rotate(90deg); }

    .svc-section {
      padding: 4px 0 4px 0;
      border-top: 1px solid var(--border);
    }

    .svc-section:first-of-type { border-top: none; }

    .svc-header {
      padding: 5px 16px 2px 32px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .layer-toggle {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 4px 16px 4px 32px;
      cursor: pointer;
      line-height: 1.3;
    }

    .layer-toggle:hover { background: var(--bg); }

    .layer-toggle input[type="checkbox"] {
      flex-shrink: 0;
      margin-top: 2px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .layer-label {
      font-size: 12px;
      color: var(--text);
    }

    /* ── MAP ─────────────────────────────────────────────────── */

    #map-container {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ── POPUP PANEL ─────────────────────────────────────────── */

    #popup-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: var(--panel-w);
      height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 10;
      box-shadow: -4px 0 16px rgba(0,0,0,0.08);
    }

    #popup-panel.open {
      transform: translateX(0);
    }

    #popup-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #popup-toolbar span {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #popup-close {
      background: none;
      border: none;
      font-size: 18px;
      line-height: 1;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: var(--radius);
    }

    #popup-close:hover { background: var(--bg); color: var(--text); }

    #popup-content {
      overflow-y: auto;
      flex: 1;
      padding: 0 0 16px;
    }

    .popup-coords {
      font-size: 11px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      padding: 8px 14px 6px;
    }

    .popup-loading {
      padding: 20px 14px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .popup-empty {
      padding: 20px 14px;
      color: var(--text-muted);
    }

    .popup-hint {
      padding: 0 14px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .popup-entry {
      border-top: 1px solid var(--border);
    }

    .popup-entry-header {
      padding: 8px 14px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .popup-entry-body {
      padding: 4px 14px 10px;
    }

    /* ── CHARTS ──────────────────────────────────────────────── */

    .chart-empty, .chart-raster p {
      font-size: 12px;
      color: var(--text-muted);
    }

    .raster-value-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 8px;
    }

    .raster-value {
      font-size: 24px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .raster-legend {
      max-width: 100%;
      height: auto;
      display: block;
      margin-top: 4px;
    }

    .attr-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .attr-table th,
    .attr-table td {
      padding: 3px 0;
      vertical-align: top;
      border-bottom: 1px solid var(--border);
    }

    .attr-table th {
      width: 40%;
      color: var(--text-muted);
      font-weight: 500;
      padding-right: 8px;
    }

    .attr-table td {
      color: var(--text);
      word-break: break-word;
    }

    .feature-table-layer {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 8px;
      margin-bottom: 3px;
    }

    .feature-table-layer:first-child { margin-top: 0; }

    .species-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 6px;
      margin-bottom: 2px;
    }

    .fallback-bars {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 4px;
    }

    .fb-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }

    .fb-label {
      width: 70px;
      flex-shrink: 0;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fb-bar-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .fb-bar {
      height: 14px;
      min-width: 2px;
      border-radius: 2px;
    }

    .fb-val {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .layer-filter {
      margin: 2px 16px 4px 52px;
    }

    .layer-filter input {
      width: 100%;
      padding: 3px 6px;
      font-size: 11px;
      font-family: var(--font);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      outline: none;
    }

    .layer-filter input:focus {
      border-color: var(--accent);
    }

    .layer-filter input.active {
      border-color: var(--accent);
      background: #f0faf6;
    }

    .report-toggle {
      color: var(--accent);
      font-weight: 600;
    }

    .report-options {
      margin-top: 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 11px;
    }

    .report-options-summary {
      padding: 5px 10px;
      color: var(--text-muted);
      cursor: pointer;
      list-style: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .report-options-summary::-webkit-details-marker { display: none; }

    .report-options-summary::after {
      content: "›";
      font-size: 13px;
      transition: transform 0.15s;
    }

    details.report-options[open] > .report-options-summary::after { transform: rotate(90deg); }

    .report-options-body {
      padding: 5px 8px 7px;
      max-height: 180px;
      overflow-y: auto;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .report-options-group { margin-bottom: 3px; }

    .report-options-parent {
      display: flex;
      align-items: center;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      padding: 2px 0;
    }

    .report-options-children { margin-left: 16px; display: flex; flex-direction: column; gap: 1px; }

    .report-options-child,
    .report-options-item {
      display: flex;
      align-items: center;
      color: var(--text-muted);
      cursor: pointer;
      padding: 1px 0;
    }

    .report-options-parent input,
    .report-options-child input,
    .report-options-item input {
      accent-color: var(--accent);
      margin-right: 5px;
      flex-shrink: 0;
    }

    .report-btn {
      margin-top: 10px;
      width: 100%;
      padding: 6px 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 12px;
      font-family: var(--font);
      font-weight: 600;
      cursor: pointer;
    }

    .report-btn:hover { background: var(--accent-hover); }
    .report-btn:disabled { opacity: 0.6; cursor: default; }

    .report-status {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
      min-height: 14px;
    }

    /* ── LEGEND BOX ──────────────────────────────────────────────── */

    #legend-box {
      position: absolute;
      bottom: 36px;
      left: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      min-width: 150px;
      max-width: 210px;
      z-index: 5;
    }

    #legend-header {
      display: flex;
      align-items: center;
      padding: 5px 6px 4px;
      border-bottom: 1px solid var(--border);
      gap: 2px;
    }

    #legend-title {
      flex: 1;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #legend-prev, #legend-next {
      background: none;
      border: none;
      font-size: 15px;
      line-height: 1;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0 3px;
      flex-shrink: 0;
    }

    #legend-prev:hover, #legend-next:hover { color: var(--text); }

    #legend-entries {
      padding: 5px 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: 220px;
      overflow-y: auto;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text);
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.12);
    }

    .legend-wms-img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    #legend-dots {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 2px 8px 6px;
    }

    .legend-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border);
    }

    .legend-dot.active { background: var(--accent); }

    /* MapLibre overrides */
    .maplibregl-ctrl-group { box-shadow: 0 1px 4px rgba(0,0,0,0.15) !important; }

    /* ── LEGAL LINKS ─────────────────────────────────────────────── */

    #legal-links {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      font-size: 11px;
      flex-shrink: 0;
    }

    #legal-links a {
      color: var(--text-muted);
      text-decoration: none;
    }

    #legal-links a:hover { color: var(--text); }

    /* ── MODAL ───────────────────────────────────────────────────── */

    #legal-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #legal-modal.open { display: flex; }

    #legal-modal-box {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      width: 480px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    #legal-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #legal-modal-header h2 {
      font-size: 13px;
      font-weight: 600;
    }

    #legal-modal-close {
      background: none;
      border: none;
      font-size: 18px;
      line-height: 1;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: var(--radius);
    }

    #legal-modal-close:hover { background: var(--bg); color: var(--text); }

    #legal-modal-body {
      overflow-y: auto;
      padding: 16px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text);
    }

    #legal-modal-body h3 {
      font-size: 12px;
      font-weight: 600;
      margin-top: 12px;
      margin-bottom: 4px;
    }

    #legal-modal-body h3:first-child { margin-top: 0; }

    #legal-modal-body p { margin-bottom: 6px; }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>Forst Map</h1>
        <p>Geodatendienste in Baden-Württemberg</p>
      </div>
      <nav id="sidebar-nav"></nav>
      <div id="legal-links">
        <a href="#" id="link-impressum">Impressum</a>
        <a href="#" id="link-datenschutz">Datenschutz</a>
      </div>
    </aside>

    <div id="map-container">
      <div id="map"></div>
      <button id="sidebar-toggle" title="Sidebar ein-/ausblenden">‹</button>

      <div id="legal-modal">
        <div id="legal-modal-box">
          <div id="legal-modal-header">
            <h2 id="legal-modal-title"></h2>
            <button id="legal-modal-close" title="Schließen">×</button>
          </div>
          <div id="legal-modal-body"></div>
        </div>
      </div>

      <div id="legend-box" hidden>
        <div id="legend-header">
          <button id="legend-prev">‹</button>
          <span id="legend-title"></span>
          <button id="legend-next">›</button>
        </div>
        <div id="legend-entries"></div>
        <div id="legend-dots"></div>
      </div>

      <div id="popup-panel">
        <div id="popup-toolbar">
          <span>Lokal</span>
          <button id="popup-close" title="Schließen">×</button>
        </div>
        <div id="popup-content"></div>
      </div>
    </div>
  </div>

  <script type="module" src="src/map.js"></script>
  <script>
    const IMPRESSUM = `
      <h3>Angaben gemäß § 5 TMG</h3>
      <p>Lorenz Bachfischer<br>Rohrgraben 11<br>79114 Freiburg im Breisgau</p>
      <h3>Kontakt</h3>
      <p>E-Mail: lorenz.bachfischer@posteo.de</p>
      <h3>Hinweis zu Geodaten</h3>
      <p>Die dargestellten Geodaten stammen von der Forstlichen Versuchs- und Forschungsanstalt Baden-Württemberg (FVA), dem Deutschen Wetterdienst (DWD) und dem Landesamt für Geoinformation und Landentwicklung Baden-Württemberg (LGL BW). Die Nutzungsbedingungen der jeweiligen Anbieter sind zu beachten.</p>
    `;

    const DATENSCHUTZ = `
      <h3>Verantwortlicher</h3>
      <p>Lorenz Bachfischer, Rohrgraben 11, 79114 Freiburg im Breisgau<br>E-Mail: lorenz.bachfischer@posteo.de</p>
      <h3>Erhebung und Verarbeitung personenbezogener Daten</h3>
      <p>Diese Anwendung speichert keine personenbezogenen Daten. Es werden keine Cookies gesetzt und kein Tracking durchgeführt.</p>
      <h3>Externe Dienste</h3>
      <p>Beim Laden der Kartenanwendung werden Verbindungen zu folgenden externen Diensten hergestellt:</p>
      <p><strong>OpenFreeMap</strong> (Basiskarte): Bereitgestellt von OpenFreeMap (openfreemap.org), basierend auf OpenStreetMap-Daten. Beim Abrufen von Kartenkacheln wird Ihre IP-Adresse an den Server übermittelt.</p>
      <p><strong>FVA / LGL BW / DWD</strong> (Geodatendienste): Kartendaten und Abfragen werden über den OWS-Proxy des LGL BW abgerufen. Dabei wird Ihre IP-Adresse an den jeweiligen Server übermittelt.</p>
      <p><strong>unpkg.com</strong> (CDN): JavaScript-Bibliotheken werden von unpkg.com geladen. Dabei wird Ihre IP-Adresse übermittelt.</p>
    `;

    const modal   = document.getElementById("legal-modal");
    const title   = document.getElementById("legal-modal-title");
    const body    = document.getElementById("legal-modal-body");
    const closeBtn = document.getElementById("legal-modal-close");

    function openModal(heading, html) {
      title.textContent = heading;
      body.innerHTML = html;
      modal.classList.add("open");
    }

    document.getElementById("link-impressum").addEventListener("click", e => {
      e.preventDefault(); openModal("Impressum", IMPRESSUM);
    });
    document.getElementById("link-datenschutz").addEventListener("click", e => {
      e.preventDefault(); openModal("Datenschutzerklärung", DATENSCHUTZ);
    });
    closeBtn.addEventListener("click", () => modal.classList.remove("open"));
    modal.addEventListener("click", e => { if (e.target === modal) modal.classList.remove("open"); });

    const sidebarToggle = document.getElementById("sidebar-toggle");
    const sidebar = document.getElementById("sidebar");
    sidebarToggle.addEventListener("click", () => {
      const collapsed = sidebar.classList.toggle("collapsed");
      sidebarToggle.textContent = collapsed ? "›" : "‹";
    });
  </script>
</body>
</html>
